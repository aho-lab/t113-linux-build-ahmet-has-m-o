name: T113-Linux-Zip-Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    # Sunucu içindeki chroot engellerini aşmak için tam Docker ayrıcalığı veriyoruz
    container:
      image: ubuntu:22.04
      options: --privileged
    steps:
    - name: Sunucu İçi Gerekli Araçları Yükle
      run: |
        apt update
        apt install -y python3 git openssl openssh-client kpartx util-linux python3-pip parted dosfstools binfmt-support qemu-user-static sudo
        pip3 install "pmbootstrap==2.3.0" --break-system-packages

    - name: postmarketOS Derle ve Paketle
      run: |
        rm -rf ~/.config/pmbootstrap
        mkdir -p ~/.config/pmbootstrap
        
        pmbootstrap config work /tmp/pmbootstrap_work
        pmbootstrap config jobs 2
        pmbootstrap config channel edge
        
        # Sunucu kısıtlamalarını aşarak doğrudan kuruluma zorluyoruz
        pmbootstrap --assume-yes init --path=/tmp/pmbootstrap_work --workaround-key-missing --mirror-alpine=http://alpinelinux.org --repository=edge --device=samsung-goyavewifi --ui=xfce4
        pmbootstrap --assume-yes install --android-recovery-zip --recovery-install-partition=external_sd
        pmbootstrap export
        
        mkdir -p /tmp/output
        cp /tmp/postmarketOS-export/pmos-samsung-goyavewifi.zip /tmp/output/

    - name: Dosyayi Yukleme Bolumune Gonder
      uses: actions/upload-artifact@v4
      with:
        name: SM-T113-Linux-Kurulum-Dosyasi
        path: /tmp/output/pmos-samsung-goyavewifi.zip
