name: T113-Linux-Zip-Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Gerekli Paketleri ve pmbootstrap Aracini Sistemden Yukle
      run: |
        sudo apt update
        # pmbootstrap aracını direkt Ubuntu'nun kendi resmi havuzundan temizce yüklüyoruz
        sudo apt install -y python3 git openssl openssh-client kpartx util-linux pmbootstrap

    - name: postmarketOS Ayarlarini Enjekte Et ve Derle
      run: |
        # Eski çakışmaları sıfırlıyoruz
        rm -rf ~/.config/pmbootstrap
        mkdir -p ~/.config/pmbootstrap
        
        # Hazır parametre ayarlarını sunucuya gömüyoruz
        sudo pmbootstrap config work /home/runner/.local/var/pmbootstrap
        sudo pmbootstrap config jobs 2
        sudo pmbootstrap config channel edge
        
        # Tam yetkiyle Linux imaj dosyasını (.zip) oluşturma komutları
        sudo pmbootstrap --assume-yes init --path=/home/runner/.local/var/pmbootstrap --workaround-key-missing --mirror-alpine=http://dl-cdn.alpinelinux.org/alpine/ --repository=edge --device=samsung-goyavewifi --ui=xfce4
        sudo pmbootstrap --assume-yes install --android-recovery-zip --recovery-install-partition=external_sd
        sudo pmbootstrap export
        
        mkdir -p output
        sudo cp /tmp/postmarketOS-export/pmos-samsung-goyavewifi.zip output/

    - name: Hazir Linux Zip Dosyasini Indirme Bolumune Gonder
      uses: actions/upload-artifact@v4
      with:
        name: SM-T113-Linux-Kurulum-Dosyasi
        path: output/pmos-samsung-goyavewifi.zip
