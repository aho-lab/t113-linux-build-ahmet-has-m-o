name: T113-Linux-Zip-Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Hataya sebep olan checkout adımını tamamen sildik, sunucu artık Node 20 engeline takılmayacak
    - name: Gerekli Paketleri Yukle ve pmbootstrap Klonla
      run: |
        sudo apt update
        sudo apt install -y python3 git openssl openssh-client kpartx util-linux
        
        # Temiz başlangıç garanti ediliyor
        rm -rf pmbootstrap
        
        git clone https://postmarketos.org
        mkdir -p ~/.local/bin
        rm -f ~/.local/bin/pmbootstrap
        ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap

    - name: postmarketOS Ayarlarini Enjekte Et ve Derle
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        
        rm -rf ~/.config/pmbootstrap
        mkdir -p ~/.config/pmbootstrap
        
        pmbootstrap config work /home/runner/.local/var/pmbootstrap
        pmbootstrap config jobs 2
        pmbootstrap config channel edge
        
        # Tam yetkiyle sistem kurulum adımları
        sudo env PATH="$PATH" pmbootstrap --assume-yes init --path=/home/runner/.local/var/pmbootstrap --workaround-key-missing --mirror-alpine=http://alpinelinux.org --repository=edge --device=samsung-goyavewifi --ui=xfce4
        sudo env PATH="$PATH" pmbootstrap --assume-yes install --android-recovery-zip --recovery-install-partition=external_sd
        sudo env PATH="$PATH" pmbootstrap export
        
        mkdir -p output
        sudo cp /tmp/postmarketOS-export/pmos-samsung-goyavewifi.zip output/

    - name: Hazir Linux Zip Dosyasini Indirme Bolumune Gonder
      uses: actions/upload-artifact@v4
      with:
        name: SM-T113-Linux-Kurulum-Dosyasi
        path: output/pmos-samsung-goyavewifi.zip
