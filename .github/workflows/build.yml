name: T113 Linux Zip Builder
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Cek
      uses: actions/checkout@v4

    - name: Gerekli Paketleri Sunucuya Yukle
      run: |
        sudo apt update
        sudo apt install -y python3-pip git openssl openssh-client kpartx util-linux pipx
        # pipx kullanarak güvenli izolasyonda kurulum yapıyoruz, böylece 12. saniyedeki python hatası tamamen çözülüyor
        pipx install pmbootstrap

    - name: postmarketOS Baslat ve Dosyayi Derle
      run: |
        # pipx ile yüklenen aracı sunucuya tanıtıyoruz
        export PATH="$HOME/.local/bin:$PATH"
        
        # Tüm sorulara otomatik "enter" cevabı veriyoruz
        yes "" | pmbootstrap init --path=$HOME/.local/var/pmbootstrap --workaround-key-missing --mirror-alpine=http://dl-cdn.alpinelinux.org/alpine/ --repository=edge --device=samsung-goyavewifi --ui=xfce4
        
        # İmaj üretme ve paketleme adımları
        yes "" | pmbootstrap install --android-recovery-zip --recovery-install-partition=external_sd
        pmbootstrap export
        mkdir -p output
        cp /tmp/postmarketOS-export/pmos-samsung-goyavewifi.zip output/

    - name: Hazir Linux Zip Dosyasini Indirme Bolumune Gonder
      uses: actions/upload-artifact@v4
      with:
        name: SM-T113-Linux-Kurulum-Dosyasi
        path: output/pmos-samsung-goyavewifi.zip
